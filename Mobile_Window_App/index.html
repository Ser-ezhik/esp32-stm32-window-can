<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#061229">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Окна">
  <link rel="manifest" href="./manifest.json">
  <title>Окна ESP32</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#030918;color:#eff7ff;font-family:Arial,sans-serif}
    main{max-width:520px;margin:auto;padding:22px 16px 28px}.panel{background:#061229;border:1px solid #13284d;border-radius:18px;padding:16px;box-shadow:0 18px 45px rgba(0,0,0,.34)}
    h1{font-size:24px;margin:6px 0 2px}p{color:#9fb1cf}.status{height:118px;line-height:1.35;margin:14px 0;overflow:hidden}.grid{display:grid;gap:12px;grid-template-rows:repeat(4,62px)}
    button{width:100%;height:62px;border:0;border-radius:14px;padding:0 16px;color:white;font-size:20px;font-weight:bold;touch-action:manipulation;background:#116fae}button:active{transform:scale(.99)}
    .open{background:#0984c6}.closed{background:#2452b8}.vent{background:#0f8d72}.stop{background:#9b1c2a}
    input,select{width:100%;padding:13px 12px;margin:6px 0 12px;border-radius:12px;border:1px solid #1a3763;background:#091735;color:white;font-size:16px}
    .row{display:flex;gap:8px}.row>*{flex:1}.link{background:transparent;border:1px solid #244a78;color:#8bdcff;font-size:15px;padding:11px}.hide{display:none}.small{font-size:13px;color:#7f91b0}
  </style>
</head>
<body>
<main>
  <div class="panel">
    <h1>Управление окнами</h1>
    <p>ESP32 window controller</p>
    <label>Окно</label>
    <select id="target"></select>
    <div id="status" class="status">Загрузка...</div>
    <div class="grid">
      <button class="open" data-mode="open">Открыто</button>
      <button class="closed" data-mode="closed">Закрыто</button>
      <button class="vent" data-mode="vent">Проветривание</button>
      <button class="stop" data-mode="stop">Стоп</button>
    </div>
    <p><button id="settingsBtn" class="link">Настройки соединения</button></p>
  </div>

  <div id="settings" class="panel hide" style="margin-top:14px">
    <h1>Соединение</h1>
    <label>Адрес ESP32</label>
    <input id="base" placeholder="http://192.168.100.5">
    <label>Логин</label>
    <input id="user" placeholder="admin">
    <label>Пароль</label>
    <input id="pass" type="password">
    <div class="row">
      <button id="save" class="link">Сохранить</button>
      <button id="reload" class="link">Обновить окна</button>
    </div>
    <p class="small">Если приложение открыто прямо с ESP32, адрес можно оставить как есть.</p>
  </div>
</main>
<script>
let cfg=JSON.parse(localStorage.winApp||"{}"),busy=0,targets=[];
const $=id=>document.getElementById(id);
function base(){return (cfg.base||location.origin).replace(/\/$/,"")}
function hdr(){let h={};if(cfg.user||cfg.pass)h.Authorization="Basic "+btoa((cfg.user||"")+":"+(cfg.pass||""));return h}
function n(v){return {open:"Открыто",closed:"Закрыто",vent:"Проветривание",none:"неизвестно"}[v]||v}
function rq(u,o,m){let c=new AbortController(),t=setTimeout(()=>c.abort(),m);o=o||{};o.signal=c.signal;o.headers={...(o.headers||{}),...hdr()};return fetch(u,o).finally(()=>clearTimeout(t))}
async function status(){if(busy)return;try{let t=$("target").value;if(!t)return;let r=await rq(base()+"/api/window?target="+encodeURIComponent(t),{cache:"no-store"},1000);let s=await r.json();$("status").innerHTML="<b>"+(s.name||"-")+"</b><br>Состояние: "+(s.state||"unknown")+"<br>Цель: "+n(s.target)+"<br>Авария: "+(s.fault||"none")}catch(e){$("status").textContent="Нет связи с ESP32"}}
async function cmd(mode){if(busy)return;busy=1;$("status").textContent="Команда отправляется...";let f=new FormData();f.set("target",$("target").value);f.set("mode",mode);f.set("ajax","1");try{await rq(base()+"/window/cmd",{method:"POST",body:f,cache:"no-store"},900);setTimeout(status,160)}catch(e){$("status").textContent="Нет ответа ESP32"}finally{busy=0}}
async function addTarget(v){try{let r=await rq(base()+"/api/window?target="+v,{cache:"no-store"},900);let s=await r.json();targets.push({v,n:s.name||v})}catch(e){}}
async function loadTargets(){targets=[];await addTarget("local0");await addTarget("local1");try{let r=await rq(base()+"/api/rs485",{cache:"no-store"},1200);let j=await r.json();(j.nodes||[]).forEach((x,i)=>{if(x.enabled)targets.push({v:"rs"+i,n:(x.name||("RP2040 "+(i+1)))})})}catch(e){}$("target").innerHTML=targets.map(x=>"<option value=\""+x.v+"\">"+x.n+"</option>").join("")||"<option value=\"local0\">local0</option>";status()}
$("settingsBtn").onclick=()=>$("settings").classList.toggle("hide");
$("save").onclick=()=>{cfg={base:$("base").value||location.origin,user:$("user").value,pass:$("pass").value};localStorage.winApp=JSON.stringify(cfg);loadTargets()};
$("reload").onclick=loadTargets;
document.querySelectorAll("button[data-mode]").forEach(b=>b.addEventListener("pointerdown",e=>{e.preventDefault();cmd(b.dataset.mode)}));
$("target").onchange=status;$("base").value=cfg.base||location.origin;$("user").value=cfg.user||"";$("pass").value=cfg.pass||"";
if("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});
loadTargets();setInterval(status,5000);
</script>
</body>
</html>
