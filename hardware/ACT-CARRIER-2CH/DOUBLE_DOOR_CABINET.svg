  <text x="365" y="548" font-family="Arial, sans-serif" font-size="15" fill="#263d33">UART 3</text>

  <path d="M105 145 H85 V105 H790" fill="none" stroke="#1d6c9c" stroke-width="6"/>
  <rect x="800" y="77" width="250" height="55" fill="#d9eaf3" stroke="#1d6c9c" stroke-width="2"/>
