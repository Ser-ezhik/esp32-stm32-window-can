  <text x="830" y="441" font-family="Arial, sans-serif" font-size="16" fill="#33443a">ESP32 + CC1101</text>
  <text x="830" y="469" font-family="Arial, sans-serif" font-size="16" fill="#33443a">CAN input protection</text>
