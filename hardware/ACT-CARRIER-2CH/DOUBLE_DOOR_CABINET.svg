  <rect x="60" y="120" width="1080" height="530" rx="4" fill="#e8eee9" stroke="#496356" stroke-width="3"/>

  <rect x="105" y="180" width="225" height="285" fill="#1f6b4f" stroke="#143f30" stroke-width="3"/>
