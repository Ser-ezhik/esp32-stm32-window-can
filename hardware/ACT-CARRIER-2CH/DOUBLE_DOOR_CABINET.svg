  <text x="126" y="244" font-family="Arial, sans-serif" font-size="15" fill="#d9f0e4">STM32 + 2 x VNH5019</text>
  <text x="126" y="269" font-family="Arial, sans-serif" font-size="15" fill="#d9f0e4">Actuators 1, 2</text>
